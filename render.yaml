services:
  - type: web
    name: taxi-saas-backend
    env: node
    buildCommand: npm install --include=dev && cd apps/api && npx prisma generate && npm run build
    startCommand: cd apps/api && npm run start:prod
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
